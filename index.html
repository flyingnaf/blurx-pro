<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BlurX Pro</title>
  <meta name="theme-color" content="#b30000" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <h1>BlurX Pro</h1>
        <p>تمويه، بكسلة، أو تعتيم جزء محدد من الصور والفيديو و GIF.</p>
      </div>
      <span class="badge">PWA</span>
    </header>

    <section class="panel upload" id="dropZone">
      <input id="fileInput" type="file" accept="image/*,video/*,.gif,.mov,.mp4,.webm,.m4v" />
      <label for="fileInput">اختر ملف أو اسحبه هنا</label>
      <small id="fileInfo">لم يتم اختيار ملف</small>
    </section>

    <section class="workspace">
      <aside class="panel tools">
        <h2>الأدوات</h2>
        <div class="row">
          <button class="active" data-effect="blur">تمويه</button>
          <button data-effect="pixelate">بكسلة</button>
          <button data-effect="darken">تعتيم</button>
        </div>

        <label>قوة التأثير: <b id="intensityValue">16</b></label>
        <input id="intensity" type="range" min="1" max="60" value="16" />

        <label>نعومة الحواف: <b id="featherValue">8</b></label>
        <input id="feather" type="range" min="0" max="40" value="8" />

        <div class="row">
          <button id="applyBtn">تطبيق على التحديد</button>
          <button id="fullBtn">تطبيق كامل</button>
        </div>
        <div class="row">
          <button id="resetBtn">إعادة ضبط</button>
          <button id="playBtn">تشغيل/إيقاف</button>
        </div>

        <h2>تصدير الصور</h2>
        <div class="grid">
          <button data-export-img="png">PNG</button>
          <button data-export-img="jpeg">JPG</button>
          <button data-export-img="webp">WEBP</button>
          <button data-export-img="gif">GIF</button>
        </div>

        <h2>تصدير الفيديو</h2>
        <div class="grid">
          <button data-export-video="webm">WEBM</button>
          <button data-export-video="mp4">MP4 إن أمكن</button>
          <button data-export-video="gif">GIF قصير</button>
        </div>

        <div id="progressBox" class="progressBox" hidden>
          <span id="progressText"></span>
          <progress id="progressBar" max="100" value="0"></progress>
        </div>

        <p class="note">اضغط مرتين على المعاينة لتحديد كامل الملف. GIF والفيديو الطويل قد يحتاجان وقتاً وحجماً أقل.</p>
      </aside>

      <section class="preview panel">
        <div id="canvasWrap" class="canvasWrap">
          <canvas id="canvas"></canvas>
          <div id="selection" hidden></div>
        </div>
        <img id="sourceImage" alt="" hidden />
        <video id="sourceVideo" playsinline controls muted hidden></video>
      </section>
    </section>
  </main>

  <div id="toast" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/gif.js.optimized/dist/gif.js"></script>
  <script src="app.js"></script>
</body>
</html>
