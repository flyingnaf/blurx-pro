<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>BlurX Pro Watermark</title>
  <meta name="theme-color" content="#b30000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="BlurX" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json?v=5" />
  <link rel="stylesheet" href="styles.css?v=5" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div>
        <h1>BlurX Pro</h1>
        <p>تمويه، بكسلة، أو تعتيم جزء محدد من الصور و GIF والفيديو.</p>
      </div>
      <span class="badge">Mobile Ready</span>
    </header>

    <section class="panel upload" id="dropZone">
      <input id="fileInput" type="file" accept="image/*,video/*,.gif,.mov,.mp4,.webm,.m4v" />
      <label for="fileInput">اختر ملف</label>
      <small id="fileInfo">لم يتم اختيار ملف</small>
    </section>

    <section class="workspace">
      <aside class="panel tools">
        <h2>الأدوات</h2>
        <div class="row">
          <button class="active" data-effect="blur">تمويه</button>
          <button data-effect="pixelate">بكسلة</button>
          <button data-effect="darken">تعتيم</button>
        </div>

        <h2>العلامة المائية</h2>
        <label>نص العلامة</label>
        <input id="watermarkText" class="textInput" type="text" value="BlurX Pro" placeholder="اكتب العلامة المائية" />

        <label>مكان العلامة</label>
        <select id="watermarkPosition">
          <option value="bottom-right" selected>أسفل يمين</option>
          <option value="bottom-left">أسفل يسار</option>
          <option value="top-right">أعلى يمين</option>
          <option value="top-left">أعلى يسار</option>
          <option value="center">وسط</option>
          <option value="tile">تكرار على كامل الصورة</option>
        </select>

        <label>حجم العلامة: <b id="watermarkSizeValue">32</b></label>
        <input id="watermarkSize" type="range" min="12" max="90" value="32" />

        <label>شفافية العلامة: <b id="watermarkOpacityValue">35</b>%</label>
        <input id="watermarkOpacity" type="range" min="5" max="100" value="35" />

        <div class="row">
          <button id="applyWatermarkBtn">تطبيق العلامة</button>
          <button id="previewWatermarkBtn">معاينة العلامة</button>
        </div>

        <label>قوة التأثير: <b id="intensityValue">16</b></label>
        <input id="intensity" type="range" min="1" max="60" value="16" />

        <label>نعومة الحواف: <b id="featherValue">8</b></label>
        <input id="feather" type="range" min="0" max="40" value="8" />

        <label>جودة GIF للجوال</label>
        <select id="gifMode">
          <option value="mobile" selected>ثابتة للجوال</option>
          <option value="quality">جودة أعلى</option>
        </select>

        <div class="row">
          <button id="applyBtn">تطبيق التحديد</button>
          <button id="fullBtn">تطبيق كامل</button>
        </div>
        <div class="row">
          <button id="resetBtn">إعادة ضبط</button>
          <button id="playBtn">تشغيل/إيقاف</button>
        </div>

        <h2>تصدير الصور</h2>
        <div class="grid">
          <button data-export-img="png">PNG</button>
          <button data-export-img="jpeg">JPG</button>
          <button data-export-img="webp">WEBP</button>
          <button data-export-img="gif">GIF متحرك</button>
        </div>

        <h2>تصدير الفيديو</h2>
        <div class="grid">
          <button data-export-video="webm">WEBM</button>
          <button data-export-video="mp4">MP4 إن أمكن</button>
          <button data-export-video="gif">GIF قصير</button>
        </div>

        <div id="progressBox" class="progressBox" hidden>
          <span id="progressText"></span>
          <progress id="progressBar" max="100" value="0"></progress>
        </div>

        <p class="note">
          للجوال: استخدم GIF أقل من 10MB ومدة قصيرة. للآيفون افتح من Safari ثم Add to Home Screen.
        </p>
      </aside>

      <section class="preview panel">
        <div id="canvasWrap" class="canvasWrap">
          <canvas id="canvas"></canvas>
          <div id="selection" hidden></div>
        </div>
        <img id="sourceImage" alt="" hidden />
        <video id="sourceVideo" playsinline controls muted hidden></video>
      </section>
    </section>
  </main>

  <div id="toast" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/gif.js.optimized/dist/gif.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gifuct-js/dist/gifuct.min.js"></script>
  <script src="app.js?v=5"></script>
</body>
</html>
